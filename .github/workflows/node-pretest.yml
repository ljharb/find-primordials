name: 'Tests: pretest/posttest'

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    uses: ljharb/actions/.github/workflows/pretest.yml@main
    with:
      skip-pack: true

  pack:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        pkg:
          - cli
          - eslint-plugin
          - lib

    steps:
      - uses: ljharb/actions/node/install@main
        name: 'install node lts/*'
        with:
          node-version: lts/*
          skip-install: true
          skip-ls-check: true

      - uses: ljharb/actions/node/pack@main
        name: 'pack: ${{matrix.pkg}}'
        with:
          working-directory: ./packages/${{matrix.pkg}}