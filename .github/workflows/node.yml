name: 'Tests: node × eslint'

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    name: 'eslint ${{ matrix.eslint }}'
    strategy:
      fail-fast: false
      matrix:
        eslint:
          - '9.39.5'
          - '9'
          - '10.7.0'
          - '10'
    uses: ljharb/actions/.github/workflows/node.yml@main
    with:
      range: '^24.18 || >= 26.5'
      type: minors
      command: 'npm install --no-save --include-workspace-root --workspaces eslint@${{ matrix.eslint }} && npm run tests-only'

  node:
    name: 'node × eslint'
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - run: true
